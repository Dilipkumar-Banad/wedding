<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilip ❤️ [Partner]</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0c0c0c;
  color: #fff;
  text-align: center;
}

h1, h2 {
  font-family: 'Playfair Display', serif;
  color: gold;
}

.hero {
  padding: 60px 20px;
  background: linear-gradient(to bottom, #000, #1a1a1a);
}

.section {
  margin: 20px;
  padding: 20px;
  border: 1px solid gold;
  border-radius: 15px;
}

img {
  width: 90%;
  max-width: 300px;
  margin: 10px;
  border-radius: 10px;
  border: 2px solid gold;
}

.countdown {
  font-size: 24px;
  color: gold;
}

</style>
</head>

<body>

<div class="hero">
  <h1>💍 Dilip Weds [Name]</h1>
  <p>With love, we invite you to celebrate our wedding</p>
</div>

<div class="section">
  <h2>📅 Wedding Details</h2>
  <p><b>Date:</b> [Enter Date]</p>
  <p><b>Venue:</b> [Enter Venue]</p>
</div>

<div class="section">
  <h2>⏳ Countdown</h2>
  <div id="timer" class="countdown"></div>
</div>

<div class="section">
  <h2>📸 Our Moments</h2>
  <img src="photo1.jpg">
  <img src="photo2.jpg">
</div>

<div class="section">
  <h2>📢 Updates</h2>
  <p>Haldi: Morning 10 AM</p>
  <p>Reception: Evening 7 PM</p>
</div>

<script>
var countDownDate = new Date("Dec 20, 2026 00:00:00").getTime();

var x = setInterval(function() {
  var now = new Date().getTime();
  var distance = countDownDate - now;

  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));

  document.getElementById("timer").innerHTML = days + " Days " + hours + " Hours ";

}, 1000);
</script>

</body>
</html>
