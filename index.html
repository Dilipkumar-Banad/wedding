<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dilip ❤️ [Partner]</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: white;
  overflow-x: hidden;
}

/* ENTRY SCREEN */
#entry {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#entry button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  background: gold;
  color: black;
  border-radius: 30px;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: url('https://images.unsplash.com/photo-1519741497674-611481863552') no-repeat center/cover;
  text-align: center;
}

.hero h1 {
  font-family: 'Cinzel', serif;
  color: gold;
}

/* SECTION */
.section {
  margin: 20px;
  padding: 20px;
  border-radius: 15px;
  border: 1px solid gold;
}

/* BUTTON */
.btn {
  display: inline-block;
  padding: 10px 20px;
  background: gold;
  color: black;
  border-radius: 20px;
  text-decoration: none;
}

/* GALLERY SLIDESHOW */
.gallery img {
  width: 90%;
  max-width: 300px;
  display: none;
  border-radius: 10px;
  border: 2px solid gold;
}

</style>
</head>

<body>

<!-- ENTRY SCREEN -->
<div id="entry">
  <button onclick="startSite()">💌 Open Invitation</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<div class="hero">
  <h1>💍 Dilip Weds [Name]</h1>
  <p>We invite you to celebrate our love</p>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>📅 Wedding</h2>
  <p>Date: [Enter Date]</p>
  <p>Venue: SBS GARDEN, Gadag - 582101</p>

  <a class="btn" href="https://www.google.com/maps/place/SBS+Garden/@15.4160222,75.627151,17z/data=!3m1!4b1!4m6!3m5!1s0x3bb8f952cbcb61c7:0x1e8b8fa5096208a5!8m2!3d15.4160222!4d75.6297259!16s%2Fg%2F11nrqm8mg3?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D">📍 Open Location</a>
</div>

<!-- RSVP -->
<div class="section">
  <h2>💌 RSVP</h2>
  <a class="btn" href="YOUR_GOOGLE_FORM_LINK">Confirm Attendance</a>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>📸 Memories</h2>
  <div class="gallery">
    <img src="https://plus.unsplash.com/premium_photo-1682092632793-c7d75b23718e?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8aW5kaWFuJTIwbWFycmlhZ2V8ZW58MHx8MHx8fDA%3D">
    <img src="https://www.google.com/maps/place/SBS+Garden/@15.4160222,75.627151,17z/data=!3m1!4b1!4m6!3m5!1s0x3bb8f952cbcb61c7:0x1e8b8fa5096208a5!8m2!3d15.4160222!4d75.6297259!16s%2Fg%2F11nrqm8mg3?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRMYA9edaShF1JGD4avR9D6t_Zz3CL0s_wD9w&s">
  </div>
</div>

<!-- SCRIPT -->
<script>
// Entry animation + music
function startSite() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("music").play();
}

// Slideshow
let index = 0;
const slides = document.querySelectorAll(".gallery img");

function showSlides() {
  slides.forEach(img => img.style.display = "none");
  index++;
  if(index > slides.length) index = 1;
  slides[index-1].style.display = "block";
  setTimeout(showSlides, 2000);
}

showSlides();
</script>

</body>
</html>
