<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dilip ❤️ [Partner]</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* ENTRY */
#entry {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

#entry button {
  padding: 15px 30px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 30px;
}

/* PARTICLES */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 0;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: url('https://images.unsplash.com/photo-1505935428862-770b6f24f629') no-repeat center/cover;
  text-align: center;
  position: relative;
}

.hero h1 {
  font-family: 'Cinzel', serif;
  color: gold;
  z-index: 1;
}

/* SECTION */
.section {
  margin: 20px;
  padding: 20px;
  border: 1px solid gold;
  border-radius: 15px;
  position: relative;
  z-index: 1;
}

h2 { color: gold; font-family: 'Cinzel'; }

/* BUTTON */
.btn {
  display: inline-block;
  padding: 10px 20px;
  background: gold;
  color: black;
  border-radius: 20px;
  text-decoration: none;
  margin: 10px;
}

/* COUNTDOWN */
.countdown {
  font-size: 24px;
}

/* GALLERY */
.gallery img {
  width: 90%;
  max-width: 300px;
  border-radius: 10px;
  border: 2px solid gold;
}

/* FLOAT BUTTON */
.floating {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

/* MUSIC BTN */
.music-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  background: gold;
  border-radius: 50%;
  padding: 10px;
}

</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry">
  <button onclick="start()">💌 Open Invitation</button>
</div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="song.mp3">
</audio>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<!-- HERO -->
<div class="hero">
  <h1>💍 Dilip Weds [Name]</h1>
  <p>Join us in celebrating love</p>
</div>

<!-- DETAILS -->
<div class="section">
  <h2>📅 Wedding Details</h2>
  <p>Date: [Enter Date]</p>
  <p>Venue: SBS GARDEN, Gadag - 582101</p>
</div>

<!-- COUNTDOWN -->
<div class="section">
  <h2>⏳ Countdown</h2>
  <div id="timer" class="countdown"></div>
</div>

<!-- VIDEO -->
<div class="section">
  <h2>🎥 Our Story</h2>
  <video width="90%" controls>
    <source src="video.mp4">
  </video>
</div>

<!-- GALLERY -->
<div class="section">
  <h2>📸 Memories</h2>
  <div class="gallery">
    <img src="photo1.jpg">
    <img src="photo2.jpg">
  </div>
</div>

<!-- RSVP -->
<div class="section">
  <h2>💌 RSVP</h2>
  <a class="btn" href="YOUR_GOOGLE_FORM_LINK">Confirm Attendance</a>
</div>

<!-- SHARE -->
<div class="section">
  <h2>📲 Share</h2>
  <a class="btn" href="https://wa.me/?text=Join%20our%20wedding%20https://dilipkumar-banad.github.io/wedding/">Share on WhatsApp</a>
</div>

<!-- FLOAT MAP -->
<a class="btn floating" href="https://www.google.com/maps/place/SBS+Garden/@15.4160222,75.627151,17z/data=!3m1!4b1!4m6!3m5!1s0x3bb8f952cbcb61c7:0x1e8b8fa5096208a5!8m2!3d15.4160222!4d75.6297259!16s%2Fg%2F11nrqm8mg3?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D">📍 Map</a>

<script>
// START
function start() {
  document.getElementById("entry").style.display = "none";
  document.getElementById("music").play();
}

// MUSIC
let playing = false;
function toggleMusic() {
  let music = document.getElementById("music");
  if (playing) {
    music.pause();
  } else {
    music.play();
  }
  playing = !playing;
}

// COUNTDOWN
let countDate = new Date("Dec 20, 2026 00:00:00").getTime();

setInterval(() => {
  let now = new Date().getTime();
  let gap = countDate - now;

  let d = Math.floor(gap / (1000*60*60*24));
  let h = Math.floor((gap % (1000*60*60*24))/(1000*60*60));
  let m = Math.floor((gap % (1000*60*60))/(1000*60));
  let s = Math.floor((gap % (1000*60))/1000);

  document.getElementById("timer").innerHTML = d+"d "+h+"h "+m+"m "+s+"s";
}, 1000);

// PARTICLES
let canvas = document.getElementById("particles");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
for(let i=0;i<100;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    d: Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="gold";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  update();
}

function update(){
  particles.forEach(p=>{
    p.y += p.d;
    if(p.y>canvas.height){p.y=0;}
  });
}

setInterval(draw,30);
</script>

</body>
</html>
